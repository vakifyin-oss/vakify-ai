services:
  - type: web
    name: ai-adaptive-learning-api
    env: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn wsgi:app --bind 0.0.0.0:$PORT
    healthCheckPath: /api/health
    envVars:
      - key: APP_ENV
        value: production
      - key: JWT_ACCESS_TOKEN_EXPIRES_SECONDS
        value: "86400"
      - key: SQLITE_TIMEOUT_SECONDS
        value: "30"
      - key: SECRET_KEY
        sync: false
      - key: JWT_SECRET_KEY
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: CORS_ORIGINS
        sync: false
      - key: ADMIN_EMAILS
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: gpt-4o-mini
      - key: OPENAI_TTS_MODEL
        value: gpt-4o-mini-tts
      - key: OPENAI_TTS_VOICE
        value: alloy
      - key: CLERK_SECRET_KEY
        sync: false
      - key: NVIDIA_IMAGE_API_KEY
        sync: false
      - key: NVIDIA_IMAGE_URL
        value: https://ai.api.nvidia.com/v1/genai/stabilityai/stable-diffusion-3-medium
      - key: NVIDIA_IMAGE_CFG_SCALE
        value: "5"
      - key: NVIDIA_IMAGE_ASPECT_RATIO
        sync: false
      - key: NVIDIA_IMAGE_STEPS
        value: "50"
      - key: NVIDIA_IMAGE_SEED
        value: "0"
      - key: NVIDIA_IMAGE_NEGATIVE_PROMPT
        sync: false
      - key: ELEVENLABS_API_KEY
        sync: false
      - key: ELEVENLABS_VOICE_ID
        value: EXAVITQu4vr4xnSDxMaL
      - key: ELEVENLABS_MODEL_ID
        value: eleven_multilingual_v2
